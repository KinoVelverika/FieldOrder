<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Pesanan</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Verifikasi Pesanan</h1>
      <a href="list.html" class="btn btn-outline">Kembali</a>
    </div>
    
    <div class="card" style="margin-bottom: 20px;">
      <h2 style="margin-bottom: 15px;">Informasi Pesanan</h2>
      
      <div class="form-group">
        <label class="form-label">Kode Pesanan</label>
        <p id="orderId">-</p>
      </div>
      
      <div class="form-group">
        <label class="form-label">Lapangan</label>
        <p id="fieldName">-</p>
      </div>
      
      <div class="form-group">
        <label class="form-label">Jadwal</label>
        <p id="schedule">-</p>
      </div>
      
      <div class="form-group">
        <label class="form-label">Harga</label>
        <p id="price">-</p>
      </div>
      
      <div class="form-group">
        <label class="form-label">Nama Pelanggan</label>
        <p id="customerName">-</p>
      </div>
    </div>
    
    <div class="card">
      <h2 style="margin-bottom: 15px;">Bukti Pembayaran</h2>
      <div style="text-align: center;">
        <img id="paymentProof" src="" alt="Bukti Pembayaran" style="max-width: 100%; max-height: 400px; border: 1px solid #eee;">
      </div>
      
      <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center;">
        <button id="approveBtn" class="btn btn-success">Setujui</button>
        <button id="rejectBtn" class="btn btn-danger">Tolak</button>
      </div>
    </div>
  </div>
  <script src="../js/admin.js"></script>
</body>
</html>
