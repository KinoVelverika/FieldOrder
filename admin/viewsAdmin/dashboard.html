<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Dashboard Admin</h1>
      <button id="logoutBtn" class="btn btn-outline">Logout</button>
    </div>
    
    <div class="card-grid">
      <a href="pesanan/list.html" class="card" id="ordersCard">
        <div class="card-icon">📋</div>
        <h2>Pesanan</h2>
        <p id="pendingOrdersCount">0</p>
        <p>Menunggu Verifikasi</p>
        <span class="badge badge-new" id="pendingOrdersBadge" style="display: none;">0</span>
      </a>
      
      <a href="jadwal/list.html" class="card">
        <div class="card-icon">📅</div>
        <h2>Jadwal</h2>
        <p>Kelola Ketersediaan</p>
      </a>
      
      <a href="lapangan/list.html" class="card">
        <div class="card-icon">⚽</div>
        <h2>Lapangan</h2>
        <p id="totalFields">0</p>
        <p>Total Lapangan</p>
      </a>
      
      <div class="card">
        <div class="card-icon">👥</div>
        <h2>Booking Hari Ini</h2>
        <p id="todayBookings">0</p>
        <p>Pemesanan</p>
      </div>
    </div>
  </div>
  <script src="js/admin.js"></script>
</body>
</html>
